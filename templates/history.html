<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
</head>
<body>

<h2>Prediction History</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Pregnancies</th>
    <th>Glucose</th>
    <th>Blood Pressure</th>
    <th>Skin Thickness</th>
    <th>Insulin</th>
    <th>BMI</th>
    <th>DPF</th>
    <th>Age</th>
    <th>Prediction</th>
</tr>

{% for row in records %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
    <td>{{ row[8] }}</td>
    <td>{{ row[9] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
