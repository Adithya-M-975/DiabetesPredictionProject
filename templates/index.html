<!DOCTYPE html>
<html>

<head>
    <title>Diabetes Prediction System</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #222;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Diabetes Prediction</h1>

        <form action="/predict" method="POST" autocomplete="off">

            <input type="text" name="pregnancies" placeholder="Pregnancies" required>

            <input type="text" name="glucose" placeholder="Glucose" required>

            <input type="text" name="bloodpressure" placeholder="Blood Pressure" required>

            <input type="text" name="skinthickness" placeholder="Skin Thickness" required>

            <input type="text" name="insulin" placeholder="Insulin" required>

            <input type="text" name="bmi" placeholder="BMI" required>

            <input type="text" name="dpf" placeholder="Diabetes Pedigree Function" required>

            <input type="text" name="age" placeholder="Age" required>

            <button type="submit">Predict</button>
            <button type="button" onclick="window.location.href='/'">
              Clear
            </button>    
    

        </form>

        {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
        {% endif %}

    </div>

</body>
</html>
