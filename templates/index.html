<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction System</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;

            background:linear-gradient(
                -45deg,
                #0f2027,
                #203a43,
                #2c5364,
                #1abc9c
            );

            background-size:400% 400%;
            animation:gradientMove 10s ease infinite;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;
            overflow-x:hidden;
        }

        @keyframes gradientMove{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .medical-bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
        }

        .medical-bg span{
            position:absolute;
            color:white;
            opacity:0.3;
            font-size:60px;
            animation:float 12s linear infinite;
        }

        @keyframes float{
            from{
                transform:translateY(100vh);
            }

            to{
                transform:translateY(-150px);
            }
        }

        .container{
            background:white;
            width:450px;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#0a4d68;
            margin-bottom:25px;
        }

        input{
            width:90%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:14px;
        }

        .btn{
            background:#00b894;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            margin:8px;
            font-size:15px;
        }

        .btn:hover{
            background:#00997a;
        }

        .result{
            margin-top:20px;
            font-size:24px;
            font-weight:bold;
            color:#222;
        }

        .confidence{
            margin-top:10px;
            font-size:18px;
            color:#444;
        }

        .logout-btn{
          text-decoration:none;
          background:#dc3545;
          color:white;
          padding:10px 15px;
          border-radius:10px;
          font-size:14px;
        }

         .logout-btn:hover{
          background:#b02a37;
        }

    </style>

</head>

<body>

    <div class="medical-bg">

        <span style="left:5%">✚</span>
        <span style="left:15%">❤</span>
        <span style="left:25%">🩺</span>
        <span style="left:35%">💊</span>
        <span style="left:45%">✚</span>
        <span style="left:55%">🩸</span>
        <span style="left:65%">❤</span>
        <span style="left:75%">💉</span>
        <span style="left:85%">🩺</span>
        <span style="left:95%">✚</span>

    </div>

    <div class="container">

        <div style="text-align:right;">
            <a href="/logout" class="logout-btn">
                🚪 Logout
            </a>
        </div>

        <h1>🏥 Diabetes Risk Prediction System</h1>

        <form action="/predict" method="POST">

            <input type="text" name="pregnancies" placeholder="Pregnancies" required>

            <input type="text" name="glucose" placeholder="Glucose" required>

            <input type="text" name="bloodpressure" placeholder="Blood Pressure" required>

            <input type="text" name="skinthickness" placeholder="Skin Thickness" required>

            <input type="text" name="insulin" placeholder="Insulin" required>

            <input type="text" name="bmi" placeholder="BMI" required>

            <input type="text" name="dpf" placeholder="Diabetes Pedigree Function" required>

            <input type="text" name="age" placeholder="Age" required>

            <br>

            <button type="submit" class="btn">
                Predict
            </button>

            <button type="button" class="btn"
                onclick="window.location.href='/'">
                Clear
            </button>

            <br>

            <a href="/history">
                <button type="button" class="btn">
                    View History
                </button>
            </a>

        </form>

        {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>

        {% endif %}

    </div>

</body>
</html>
