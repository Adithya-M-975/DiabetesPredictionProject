<!DOCTYPE html>
<html>
<head>
<title>Register - Diabetes Prediction System</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#021B79,#0575E6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    color:#0a4d68;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:95%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00997a;
}

a{
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text"
       name="username"
       placeholder="Username"
       required>

<input type="email"
       name="email"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<input type="password"
       name="confirm_password"
       placeholder="Confirm Password"
       required>

<button type="submit">
Register
</button>

</form>

<br>

<a href="/">
    Back to Login
</a>

</div>

</body>
</html>
