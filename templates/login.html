<!DOCTYPE html>
<html>
<head>
<title>Login - Diabetes Prediction System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#021B79,#0575E6);
}

/* Animated Background */

.background{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Floating Medical Icons */

.icon{
    position:absolute;
    color:rgba(255,255,255,0.15);
    font-size:50px;
    animation:float 12s linear infinite;
}

.icon:nth-child(1){
    left:10%;
    animation-duration:10s;
}

.icon:nth-child(2){
    left:30%;
    animation-duration:14s;
}

.icon:nth-child(3){
    left:50%;
    animation-duration:11s;
}

.icon:nth-child(4){
    left:70%;
    animation-duration:16s;
}

.icon:nth-child(5){
    left:90%;
    animation-duration:13s;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
    }
}

/* Moving ECG Line */

.ecg{
    position:absolute;
    width:200%;
    height:100px;
    top:25%;
    left:-100%;
    border-top:4px solid rgba(0,255,255,0.5);
    animation:ecgmove 8s linear infinite;
}

@keyframes ecgmove{
    from{
        left:-100%;
    }
    to{
        left:0%;
    }
}

/* Login Card */

.container{
    width:420px;
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

/* Logo Circle */

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#0575E6,#00F260);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:white;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.1);
    }
    100%{
        transform:scale(1);
    }
}

h1{
    margin-top:20px;
    color:#0a4d68;
}

.subtitle{
    color:gray;
    margin-bottom:20px;
}

/* Inputs */

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

/* Button */

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#0575E6,#00F260);
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>
</head>

<body>

<div class="background">

<div class="ecg"></div>

<div class="icon">✚</div>
<div class="icon">🩺</div>
<div class="icon">💊</div>
<div class="icon">❤</div>
<div class="icon">💉</div>

</div>

<div class="container">

<div class="logo">
🏥
</div>

<h1 style="color:red;">DIABETES PREDICTION SYSTEM</h1>

<p class="subtitle">
AI Powered Healthcare Solution
</p>

{% if error %}
<p style="color:red; text-align:center;">
    {{ error }}
</p>
{% endif %}

<form action="/login" method="POST">
    <br><br>

<a href="/register">
    Create New Account
</a>

<br><br>

<a href="/forgot_password">
    Forgot Password?
</a>

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="footer">
Secure Login To Continue
</div>

</div>

</body>
</html>
