<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        body{
            font-family:Arial;
            background:linear-gradient(135deg,#0f4c81,#00b4db);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:15px;
            width:350px;
            text-align:center;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
        }

        button{
            background:#00b894;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
        }

        .result{
            color:red;
            margin-top:15px;
        }
    </style>

</head>
<body>

<div class="box">

<h2>Forgot Password</h2>

<form method="POST">

<input type="email"
       name="email"
       placeholder="Enter Registered Email"
       required>

<button type="submit">
    Find Password
</button>

</form>

{% if password %}
<div class="result">
    Your Password: {{ password }}
</div>
{% endif %}

</div>

</body>
</html>
